<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000, #1a1a1a);
  color: white;
}

header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  background: #111;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 10px;
}

.video-card {
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.video-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
}

.video-title {
  padding: 8px;
  text-align: center;
  font-size: 16px;
}

/* PAGES */
#homePage, #adPage, #playerPage {
  display: none;
}

#homePage {
  display: flex;
  flex-direction: column;
}

/* BUTTON */
button {
  padding: 10px;
  margin: 10px;
  background: red;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

.ad-box {
  margin: 10px auto;
}

/* VIDEO PLAYER */
#videoPlayer {
  width: 100%;
  max-width: 720px;
  border-radius: 8px;
  background: #000;
  outline: none;
}
</style>
</head>

<body>

<header>🔥 VIDEO APP 🔥</header>

<!-- HOME PAGE -->
<div id="homePage" class="container"></div>

<!-- AD PAGE -->
<div id="adPage" style="text-align:center;">
  <h3>👉 Ads බලලා video unlock කරන්න</h3>

  <!-- ADS -->

  <div class="ad-box">
    <script>
    atOptions = {

  <h3>👉 Ads බලලා video unlock කරන්න</h3>

    <script>
    atOptions = {
      'key' : '6bf89ebb4e1e6bffe64d9d95fe6cce70',

  <div class="ad-box">
    <script>
    atOptions = {
      'key' : 'f02391ceb7e8e863beea00f26ec21584',
      'format' : 'iframe',
      'height' : 600,
      'width' : 160,
      'params' : {}

    </script>

  </div>

  <button id="watchBtn" disabled>⏳ Wait 5 sec...</button>

<!-- PLAYER PAGE -->
<div id="playerPage" style="text-align:center;">
  <button onclick="goHome()">⬅ Back</button>
  <h3 id="videoTitle"></h3>

  <!-- ✅ Native HTML5 video player for direct MP4 links -->
  <video id="videoPlayer" controls controlsList="nodownload">
    <source id="videoSource" src="" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<script>

/* =====================
   VIDEO LIST — Replace the src & thumbnail with your real MP4 URLs
===================== */
const videos = [
  {
    title: "Video 1",
    video: "https://www.pornhub.com/view_video.php?viewkey=69c65dc4b156d",       // 🔁 Replace with your MP4 link
    thumbnail: "https://via.placeholder.com/300x150?text=Video+1"
  },
  {
    title: "Video 2",
    video: "https://your-server.com/video2.mp4",       // 🔁 Replace with your MP4 link
    thumbnail: "https://via.placeholder.com/300x150?text=Video+2"
  },
  {
    title: "Video 3",
    video: "https://your-server.com/video3.mp4",       // 🔁 Replace with your MP4 link
    thumbnail: "https://via.placeholder.com/300x150?text=Video+3"
  }
];

/* DOM ELEMENTS */
const home = document.getElementById("homePage");
const adPage = document.getElementById("adPage");
const playerPage = document.getElementById("playerPage");

let currentVideo = "";
let currentTitle = "";

/* LOAD VIDEO CARDS */
videos.forEach(v => {
  let div = document.createElement("div");
  div.className = "video-card";
  div.innerHTML = `
    <img src="${v.thumbnail}" alt="${v.title}">
    <div class="video-title">${v.title}</div>
  `;
  div.onclick = () => openAdPage(v);
  home.appendChild(div);
});

/* OPEN AD PAGE */
function openAdPage(v) {
  currentVideo = v.video;
  currentTitle = v.title;
  home.style.display = "none";
  adPage.style.display = "block";

  let btn = document.getElementById("watchBtn");
  btn.disabled = true;
  btn.innerText = "⏳ Wait 5 sec...";

  setTimeout(() => {
    btn.disabled = false;
    btn.innerText = "▶ Watch Video";
    btn.onclick = playVideo;
  }, 5000);
}

/* PLAY VIDEO */
function playVideo() {
  adPage.style.display = "none";
  playerPage.style.display = "block";

  const player = document.getElementById("videoPlayer");
  const source = document.getElementById("videoSource");

  source.src = currentVideo;
  player.load();   // reload player with new source
  player.play();

  document.getElementById("videoTitle").innerText = currentTitle;
}

/* GO BACK */
function goHome() {
  const player = document.getElementById("videoPlayer");
  player.pause();
  player.currentTime = 0;

  playerPage.style.display = "none";
  home.style.display = "flex";
}

</script>

</body>
</html>
