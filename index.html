<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000000, #1a1a1a);
  color: white;
}

header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  background: #111;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  padding: 10px;
}

.video-card {
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.video-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.video-title {
  padding: 8px;
  font-size: 14px;
}

#playerPage {
  display: none;
  text-align: center;
}

#videoPlayer {
  width: 100%;
  height: 220px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  background: red;
  color: white;
  cursor: pointer;
}

#progress {
  margin: 10px;
  font-size: 16px;
}
</style>

</head>

<body>

<header>🔥 VIDEO APP 🔥</header>

<div id="homePage" class="container"></div>

<div id="playerPage">
  <button onclick="goBack()">⬅ Back</button>

  <h3 id="videoTitle"></h3>

  <div id="progress">Ads clicked: 0 / 3</div>

  <button onclick="playAd()">▶ Watch Ad</button>

  <iframe id="videoPlayer" src="" allowfullscreen></iframe>
</div>

<script>

/* =====================
   👉 ADD VIDEOS HERE
===================== */

const videos = [
  {
    title: "Video 1",
    video: "https://drive.google.com/file/d/19CK_XAD-OLQoxlXkftP9tKkD7Lzzgtx1/preview",
    thumbnail: "https://via.placeholder.com/300x150"
  }
];

/* =====================
   LOAD VIDEOS
===================== */

const container = document.getElementById("homePage");

videos.forEach(v => {
  const div = document.createElement("div");
  div.className = "video-card";

  div.innerHTML = `
    <img src="${v.thumbnail}">
    <div class="video-title">${v.title}</div>
  `;

  div.onclick = () => openVideo(v);

  container.appendChild(div);
});

/* =====================
   VIDEO OPEN
===================== */

let currentVideo = "";
let adCount = 0;

function openVideo(v) {
  currentVideo = v.video;
  adCount = 0;

  document.getElementById("homePage").style.display = "none";
  document.getElementById("playerPage").style.display = "block";

  document.getElementById("videoTitle").innerText = v.title;
  updateProgress();
}

/* =====================
   ADS SYSTEM
===================== */

function playAd() {

  // 👉 YOUR ADS LINK HERE
  window.open("https://your-ad-link.com", "_blank");

  adCount++;
  updateProgress();

  if(adCount >= 3){
    document.getElementById("videoPlayer").src = currentVideo;
  }
}

function updateProgress(){
  document.getElementById("progress").innerText =
    "Ads clicked: " + adCount + " / 3";
}

/* =====================
   BACK BUTTON
===================== */

function goBack(){
  document.getElementById("playerPage").style.display = "none";
  document.getElementById("homePage").style.display = "grid";
}

</script>

</body>
</html>
