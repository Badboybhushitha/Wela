<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Hub PRO</title>

<style>
body {margin:0;font-family:Arial;background:#0d0d0d;color:white;}
header {padding:15px;text-align:center;font-size:22px;background:#111;}
#searchBar {width:95%;max-width:500px;margin:10px auto;padding:10px;border-radius:5px;border:none;display:block;font-size:16px;}

.container {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.video-card {
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}
.video-card:hover {
  transform:scale(1.03);
  box-shadow:0 0 15px #ff0000;
}

/* 🔥 THUMBNAIL FIX */
.video-card img {
  width:100%;
  height:120px;
  object-fit:cover;
  display:block;
}

.video-title {text-align:center;padding:5px;}
.video-stats {text-align:center;font-size:12px;}

#homePage,#adPage,#playerPage {display:none;}
#homePage {display:grid;}

button {
  padding:10px;
  margin:10px;
  background:red;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

#videoFrame {width:95%;max-width:800px;height:420px;border:none;}

</style>
</head>

<body>

<header>🔥 VIDEO HUB PRO 🔥</header>

<input type="text" id="searchBar" placeholder="Search videos...">

<div id="homePage" class="container"></div>

<div id="adPage" style="text-align:center;">
  <h3>👉 Ads 3ක් click කරලා පසුව unlock button click කරන්න</h3>
  <button id="adBtn1">📢 Watch Ad 1</button>
  <button id="adBtn2">📢 Watch Ad 2</button>
  <button id="adBtn3">📢 Watch Ad 3</button>
  <br>
  <button id="unlockBtn" disabled>🔓 Unlock</button>
</div>

<div id="playerPage" style="text-align:center;">
  <button onclick="goHome()">⬅ Back</button>
  <h3 id="videoTitle"></h3>
  <iframe id="videoFrame" allowfullscreen></iframe>
  <div style="margin:10px;">
    <button onclick="likeVideo()">❤️ Like</button>
    <span id="likeCount"></span>
    <span style="margin-left:20px;">👁 <span id="viewCount"></span></span>
  </div>
</div>

<script>

let videos = [
  {title:"Video 1",video:"https://www.pornhub.com/embed/69c80044122fe",thumbnail:"https://via.placeholder.com/300x150?text=Video+1"},
  {title:"Video 2",video:"https://www.pornhub.com/embed/699db237872c1",thumbnail:"https://via.placeholder.com/300x150?text=Video+2"},
  {title:"Video 3",video:"https://www.pornhub.com/embed/69cd4dd480148",thumbnail:"https://via.placeholder.com/300x150?text=Video+3"},
  {title:"Video 4",video:"https://www.pornhub.com/embed/66ab8e27a93f7",thumbnail:"https://via.placeholder.com/300x150?text=Video+4"},
  {title:"Video 5",video:"https://www.pornhub.com/embed/69c7474b64846",thumbnail:"https://via.placeholder.com/300x150?text=Video+5"},
  {title:"Video 6",video:"https://www.pornhub.com/embed/69c24f4b2ebc4",thumbnail:"https://via.placeholder.com/300x150?text=Video+6"},
  {title:"Video 7",video:"https://www.pornhub.com/embed/69c3e50792b10",thumbnail:"https://via.placeholder.com/300x150?text=Video+7"},
  {title:"Video 8",video:"https://www.pornhub.com/embed/697cef74bb92f",thumbnail:"https://via.placeholder.com/300x150?text=Video+8"},
  {title:"Video 9",video:"https://drive.google.com/file/d/1zTs06GBnZTzNMzpWkmjZRulXdZxPn0P3/preview",thumbnail:"https://via.placeholder.com/300x150?text=Video+9"},
  {title:"Video 10",video:"https://www.pornhub.com/embed/ph6364b481b3986",thumbnail:"https://via.placeholder.com/300x150?text=Video+10"}
];

const home=document.getElementById("homePage");
const searchBar=document.getElementById("searchBar");
const adPage=document.getElementById("adPage");
const playerPage=document.getElementById("playerPage");

let currentIndex=0;

/* RESET OLD DATA */
if(!localStorage.getItem("init")){
  localStorage.clear();
  localStorage.setItem("init","1");
}

/* RANDOM VIEWS */
function getRandomViews(){
  return Math.floor(Math.random()*22000)+18000;
}

/* RANDOM LIKES */
function getRandomLikes(v){
  return Math.floor(v*(0.3+Math.random()*0.4));
}

/* STORAGE */
function getViews(i){
  let v=localStorage.getItem("v"+i);
  if(v===null){
    let views=getRandomViews();
    localStorage.setItem("v"+i,views);
    localStorage.setItem("l"+i,getRandomLikes(views));
    return views;
  }
  return parseInt(v);
}

function getLikes(i){
  return parseInt(localStorage.getItem("l"+i));
}

function addView(i){
  localStorage.setItem("v"+i,getViews(i)+1);
}

function addLike(i){
  localStorage.setItem("l"+i,getLikes(i)+1);
}

/* LOAD VIDEOS WITH THUMBNAIL */
function loadVideos(filter=""){
  home.innerHTML="";
  videos.forEach((v,i)=>{
    if(v.title.toLowerCase().includes(filter.toLowerCase())){
      let div=document.createElement("div");
      div.className="video-card";
      div.innerHTML=`
        <img src="${v.thumbnail}">
        <div class="video-title">${v.title}</div>
        <div class="video-stats">👁 ${getViews(i)} | ❤️ ${getLikes(i)}</div>
      `;
      div.onclick=()=>openAdPage(i);
      home.appendChild(div);
    }
  });
}
loadVideos();

/* SEARCH */
searchBar.addEventListener("input",()=>loadVideos(searchBar.value));

/* ADS PAGE */
function openAdPage(i){
  currentIndex=i;
  addView(i);
  home.style.display="none";
  adPage.style.display="block";
}

/* ADS */
let a1=false,a2=false,a3=false;

adBtn1.onclick=()=>{window.open("#");a1=true;check();}
adBtn2.onclick=()=>{window.open("#");a2=true;check();}
adBtn3.onclick=()=>{window.open("#");a3=true;check();}

function check(){
  if(a1&&a2&&a3) unlockBtn.disabled=false;
}

/* PLAY */
unlockBtn.onclick=()=>{
  adPage.style.display="none";
  playerPage.style.display="block";
  videoFrame.src=videos[currentIndex].video;
  videoTitle.innerText=videos[currentIndex].title;
  updateStats();
}

/* STATS */
function updateStats(){
  likeCount.innerText="❤️ "+getLikes(currentIndex);
  viewCount.innerText=getViews(currentIndex);
}

/* LIKE */
function likeVideo(){
  addLike(currentIndex);
  updateStats();
}

/* BACK */
function goHome(){
  videoFrame.src="";
  playerPage.style.display="none";
  home.style.display="grid";
  unlockBtn.disabled=true;
  a1=a2=a3=false;
  loadVideos(searchBar.value);
}

</script>

</body>
</html>
