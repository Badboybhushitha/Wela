<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Video Site</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 0;
}
h1 { margin: 20px 0; }
.video-thumb {
  display: inline-block;
  margin: 15px;
  cursor: pointer;
  text-align: center;
}
.video-thumb img {
  width: 200px;
  height: 120px;
  border-radius: 5px;
}
.ads {
  margin: 15px;
}
.unlock-btn {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
  background: blue;
  color: #fff;
  border: none;
  border-radius: 5px;
}
iframe {
  width: 80%;
  height: 450px;
  display: none;
  margin-top: 20px;
}
</style>
</head>
<body>

<h1>My Video Site</h1>

<!-- Home Page -->
<div id="homePage">

  <!-- Video 1 -->
  <div class="video-thumb" onclick="openVideo('video1')">
    <img src="https://i.imgur.com/abcd.jpg" alt="Video 1">
    <p>Video 1</p>
  </div>

  <!-- Video 2 -->
  <div class="video-thumb" onclick="openVideo('video2')">
    <img src="https://i.imgur.com/efgh.jpg" alt="Video 2">
    <p>Video 2</p>
  </div>

  <!-- Video 3 -->
  <div class="video-thumb" onclick="openVideo('video3')">
    <img src="https://i.imgur.com/ijkl.jpg" alt="Video 3">
    <p>Video 3</p>
  </div>

</div>

<!-- Video Unlock Section -->
<div id="videoPage" style="display:none;">
  <h1>Watch Video</h1>
  <p>Watch the ads to unlock the video!</p>

  <!-- Ads placeholders -->
  <div class="ads" id="ads1">[Paste Addstera Ad 1 code here]</div>
  <div class="ads" id="ads2">[Paste Addstera Ad 2 code here]</div>
  <div class="ads" id="ads3">[Paste Addstera Ad 3 code here]</div>

  <button class="unlock-btn" id="unlockBtn">Unlock Video</button>
  <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
  <br>
  <button class="unlock-btn" onclick="backHome()">Back to Home</button>
</div>

<script>
// Video links
const videos = {
  video1: "https://drive.google.com/file/d/19CK_XAD-OLQoxlXkftP9tKkD7Lzzgtx1/view?usp=drivesdk/preview", // <-- Replace with your Drive preview link
  video2: "https://drive.google.com/file/FILE_ID_2/preview", // <-- Replace with your Drive preview link
  video3: "https://drive.google.com/file/FILE_ID_3/preview"  // <-- Replace with your Drive preview link
};

let currentVideoId = null;

function openVideo(videoId) {
  currentVideoId = videoId;
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('videoPage').style.display = 'block';
}

// Unlock button
document.getElementById('unlockBtn').onclick = function() {
  if(!currentVideoId) return;
  const iframe = document.getElementById('videoFrame');
  iframe.src = videos[currentVideoId];
  iframe.style.display = 'block';
  document.querySelectorAll('.ads').forEach(ad => ad.style.display = 'none');
  document.getElementById('unlockBtn').style.display = 'none';
}

// Back to home
function backHome() {
  document.getElementById('videoPage').style.display = 'none';
  document.getElementById('homePage').style.display = 'block';
  document.getElementById('videoFrame').style.display = 'none';
  document.getElementById('unlockBtn').style.display = 'inline-block';
  document.querySelectorAll('.ads').forEach(ad => ad.style.display = 'block');
}
</script>

</body>
</html>
