<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000, #1a1a1a);
  color: white;
}

header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  background: #111;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 10px;
}

.video-card {
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.video-card iframe {
  width: 100%;
  height: 180px;
  border: none;
}

.video-title {
  padding: 8px;
  font-size: 14px;
  text-align: center;
}

/* PLAYER */
#playerPage {
  display: none;
  text-align: center;
}

#videoPlayer {
  width: 100%;
  height: 220px;
  margin-top: 10px;
}

/* ADS */
.ad-box {
  margin: 10px auto;
}
button {
  padding: 8px 15px;
  margin: 10px 0;
  cursor: pointer;
  background-color: #111;
  color: white;
  border: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>🔥 VIDEO APP 🔥</header>

<!-- TOP POPUNDER ADS -->
<script src="https://pl29058726.profitablecpmratenetwork.com/30/72/2c/30722c1ace3c1961e8a5f50325074c57.js"></script>

<div id="homePage" class="container"></div>

<div id="playerPage">
  <button onclick="goBack()">⬅ Back</button>
  <h3 id="videoTitle"></h3>

  <!-- ADS SECTION -->
  <div class="ad-box">
    <script>
      atOptions = {
        'key' : '3811f461a69ce9f73fe20772fe30f2a1',
        'format' : 'iframe',

        'width' : 468,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/3811f461a69ce9f73fe20772fe30f2a1/invoke.js"></script>
  </div>

  <div class="ad-box">
    <script>
      atOptions = {
        'key' : '2195bb045cce62838420c9b2a6e32455',
        'format' : 'iframe',
        'height' : 250,
        'width' : 300,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/2195bb045cce62838420c9b2a6e32455/invoke.js"></script>
  </div>

  <div class="ad-box">
    <script>
      atOptions = {
        'key' : '6bf89ebb4e1e6bffe64d9d95fe6cce70',
        'format' : 'iframe',
        'height' : 300,
        'width' : 160,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/6bf89ebb4e1e6bffe64d9d95fe6cce70/invoke.js"></script>
  </div>

  <div class="ad-box">
    <script>
      atOptions = {
        'key' : 'f02391ceb7e8e863beea00f26ec21584',
        'format' : 'iframe',
        'height' : 600,
        'width' : 160,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/f02391ceb7e8e863beea00f26ec21584/invoke.js"></script>
  </div>

  <iframe id="videoPlayer" src="" allowfullscreen></iframe>
</div>

<script>

/* =====================
   VIDEOS ADD HERE
===================== */
const videos = [
  {
    title: "Video 1",
    video: "https://drive.google.com/file/d/19CK_XAD-OLQoxlXkftP9tKkD7Lzzgtx1/preview",
    thumbnail: "https://drive.google.com/file/d/19CK_XAD-OLQoxlXkftP9tKkD7Lzzgtx1/preview"
  },
  {
    title: "Video 2",
    video: "https://drive.google.com/file/d/1zTs06GBnZTzNMzpWkmjZRulXdZxPn0P3/preview",
    thumbnail: "https://drive.google.com/file/d/1zTs06GBnZTzNMzpWkmjZRulXdZxPn0P3/preview"
  }
];

/* LOAD VIDEOS */
const container = document.getElementById("homePage");

videos.forEach(v => {
  const div = document.createElement("div");
  div.className = "video-card";

  div.innerHTML = `
    <iframe src="${v.thumbnail}" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    <div class="video-title">${v.title}</div>
  `;

  div.onclick = () => openVideo(v);

  container.appendChild(div);
});

/* OPEN VIDEO */
function openVideo(v) {
  document.getElementById("homePage").style.display = "none";
  document.getElementById("playerPage").style.display = "block";
  document.getElementById("videoTitle").innerText = v.title;

  // 👉 VIDEO LOAD (delay for ad impression)
  setTimeout(() => {
    document.getElementById("videoPlayer").src = v.video;
  }, 3000);
}

/* BACK */
function goBack(){
  document.getElementById("playerPage").style.display = "none";
  document.getElementById("homePage").style.display = "flex";
}

</script>

</body>
</html>
