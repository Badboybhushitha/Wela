<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Video Site</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0a0a0a, #1f1f1f);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.video-card {
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.video-card:hover {
  transform: scale(1.05);
}

.video-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

/* PLAYER */
#playerPage {
  display: none;
  text-align: center;
  padding: 20px;
}

#videoPlayer {
  width: 90%;
  height: 400px;
}

/* BUTTON */
button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  cursor: pointer;
  background: red;
  color: white;
  font-size: 16px;
}

</style>
</head>

<body>

<header>🔥 MY VIDEO WEBSITE 🔥</header>

<!-- HOME -->
<div id="homePage" class="container"></div>

<!-- PLAYER -->
<div id="playerPage">
  <h2>Watch Video</h2>
  <p>👉 Ads 3ක් click කරාට පස්සෙ video play වෙයි</p>

  <button onclick="playAd()">Click Ad 1</button>
  <button onclick="playAd()">Click Ad 2</button>
  <button onclick="playAd()">Click Ad 3</button>

  <br><br>

  <iframe id="videoPlayer" src="" allowfullscreen></iframe>
</div>

<script>

/* ===========================
   👉 VIDEO + THUMBNAIL ADD
=========================== */

const videos = [
  {
    video: "https://drive.google.com/file/d/19CK_XAD-OLQoxlXkftP9tKkD7Lzzgtx1/preview",
    thumbnail: "https://via.placeholder.com/300x150?text=Video+1"
  },
  {
    video: "https://drive.google.com/file/d/1YYYYYYY/preview",
    thumbnail: "https://via.placeholder.com/300x150?text=Video+2"
  }
];

/* ===========================
   AUTO LOAD VIDEOS
=========================== */

const container = document.getElementById("homePage");

videos.forEach((item) => {
  const div = document.createElement("div");
  div.className = "video-card";

  div.innerHTML = `
    <img src="${item.thumbnail}">
  `;

  div.onclick = () => openVideo(item.video);

  container.appendChild(div);
});

/* ===========================
   OPEN VIDEO PAGE
=========================== */

let currentVideo = "";
let adClicks = 0;

function openVideo(link) {
  currentVideo = link;
  adClicks = 0;

  document.getElementById("homePage").style.display = "none";
  document.getElementById("playerPage").style.display = "block";
}

/* ===========================
   AD SYSTEM (3 CLICKS)
=========================== */

function playAd() {

  // 👉 මෙතන Ads link දාන්න
  window.open("https://your-ad-link.com", "_blank");

  adClicks++;

  if(adClicks >= 3){
    document.getElementById("videoPlayer").src = currentVideo;
    alert("✅ Now you can watch the video!");
  }
}

</script>

</body>
</html>
