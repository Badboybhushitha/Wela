<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000, #1a1a1a);
  color: white;
}

header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  background: #111;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 10px;
}

.video-card {
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.video-card iframe {
  width: 100%;
  height: 180px;
  border: none;
}

.video-title {
  padding: 8px;
  text-align: center;
}

/* PAGES */
#homePage, #adPage, #playerPage {
  display: none;
}

#homePage {
  display: flex;
}

/* BUTTON */
button {
  padding: 10px;
  margin: 10px;
  background: red;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

.ad-box {
  margin: 10px auto;
}

#videoPlayer {
  width: 100%;
  height: 220px;
}
</style>
</head>

<body>

<header>🔥 VIDEO APP 🔥</header>

<!-- HOME -->
<div id="homePage" class="container"></div>

<!-- AD PAGE -->
<div id="adPage" style="text-align:center;">
<h3>👉 Ads බලලා video unlock කරන්න</h3>

<button id="watchBtn" disabled>⏳ Wait 5 sec...</button>
</div>

<!-- PLAYER PAGE -->
<div id="playerPage" style="text-align:center;">
<button onclick="goHome()">⬅ Back</button>
<h3 id="videoTitle"></h3>
<iframe id="videoPlayer" src="" allowfullscreen></iframe>
</div>

<script>

/* =====================
   VIDEO LIST
===================== */
const videos = [
  {
    title: "Video 1",
    video: "https://drive.google.com/file/d/19CK_XAD-OLQoxlXkftP9tKkD7Lzzgtx1/preview",
    thumbnail: "https://drive.google.com/file/d/19CK_XAD-OLQoxlXkftP9tKkD7Lzzgtx1/preview"
  },
  {
    title: "Video 2",
    video: "https://drive.google.com/file/d/1zTs06GBnZTzNMzpWkmjZRulXdZxPn0P3/preview",
    thumbnail: "https://drive.google.com/file/d/1zTs06GBnZTzNMzpWkmjZRulXdZxPn0P3/preview"
  }
];

/* DOM ELEMENTS */
const home = document.getElementById("homePage");
const adPage = document.getElementById("adPage");
const playerPage = document.getElementById("playerPage");

let currentVideo = "";

/* LOAD VIDEOS */
videos.forEach(v => {
  let div = document.createElement("div");
  div.className = "video-card";
  div.innerHTML = `
    <iframe src="${v.thumbnail}" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    <div class="video-title">${v.title}</div>
  `;
  div.onclick = () => openAdPage(v);
  home.appendChild(div);
});

/* OPEN AD PAGE */
function openAdPage(v){
  currentVideo = v.video;
  home.style.display = "none";
  adPage.style.display = "block";

  let btn = document.getElementById("watchBtn");
  btn.disabled = true;
  btn.innerText = "⏳ Wait 5 sec...";

  setTimeout(()=>{
    btn.disabled = false;
    btn.innerText = "▶ Watch Video";
    btn.onclick = playVideo;
  },5000);
}

/* PLAY VIDEO */
function playVideo(){
  adPage.style.display = "none";
  playerPage.style.display = "block";
  document.getElementById("videoPlayer").src = currentVideo;
  document.getElementById("videoTitle").innerText = videos.find(v=>v.video===currentVideo).title;
}

/* GO BACK */
function goHome(){
  playerPage.style.display = "none";
  home.style.display = "flex";
}

</script>

</body>
</html>
